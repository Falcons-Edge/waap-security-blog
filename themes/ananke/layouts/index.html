<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ .Site.Title }}</title>
</head>
<body>
  <header><h1>{{ .Site.Title }}</h1></header>
  <main>
  <h2>Latest Posts</h2>
  {{ range first 10 .Site.RegularPages }}
    <article>
      <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
      <time>{{ .Date.Format "2006-01-02" }}</time>
    </article>
  {{ end }}
  </main>
</body>
</html>
