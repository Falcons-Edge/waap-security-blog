<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - {{ .Site.Title }}</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/style.css">
    <meta name="description" content="{{ .Site.Params.description | default .Site.Title }}">
    <meta name="author" content="{{ .Site.Title }}">
    <meta property="og:title" content="{{ .Title }}">
    <meta property="og:description" content="{{ .Summary | plainify | truncate 200 }}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{ .Permalink }}">
    <link rel="canonical" href="{{ .Permalink }}">
    <link rel="canonical" href="{{ .Permalink }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ .Title }}">
    <meta name="twitter:description" content="{{ .Description | default .Summary | plainify | truncate 200 }}">
    <meta property="article:published_time" content="{{ .Date.Format "2006-01-02T15:04:05Z" }}">
    <meta property="article:modified_time" content="{{ .Lastmod.Format "2006-01-02T15:04:05Z" }}">
    {{ range .Params.tags }}
    <meta property="article:tag" content="{{ . }}">
    {{ end }}
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": "{{ .Title }}",
        "description": "{{ .Summary | plainify | truncate 200 }}",
        "author": {
            "@type": "Organization",
            "name": "{{ .Site.Title }}"
        },
        "publisher": {
            "@type": "Organization",
            "name": "{{ .Site.Title }}"
        },
        "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z" }}",
        "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z" }}",
        "mainEntityOfPage": {
            "@type": "WebPage",
            "@id": "{{ .Permalink }}"
        }
    }
    </script>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [{
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "{{ .Site.BaseURL }}"
        },{
            "@type": "ListItem",
            "position": 2,
            "name": "{{ .Title }}",
            "item": "{{ .Permalink }}"
        }]
    }
    </script>
    <!-- Google Search Console placeholder: add <meta name="google-site-verification" content="..."> here -->
    <!-- Google Analytics placeholder: add GA4 gtag snippet here -->
    <script>
    (function(){
        var d = window.location.hostname;
        var p = window.location.pathname;
        var r = document.referrer || '';
        // Pageview tracking (1x1 pixel)
        fetch('https://bridge.falcons-edge.com/navicomputer/track?d='+encodeURIComponent(d)+'&p='+encodeURIComponent(p)+'&r='+encodeURIComponent(r), {mode:'no-cors'});
        // Affiliate link click tracking
        document.addEventListener('click', function(e){
            var t = e.target.closest('a');
            if(t && t.href && t.href.indexOf('amazon.com/dp/') !== -1){
                fetch('https://bridge.falcons-edge.com/navicomputer/track-click?d='+encodeURIComponent(d)+'&p='+encodeURIComponent(p)+'&l='+encodeURIComponent(t.href)+'&r='+encodeURIComponent(r), {mode:'no-cors'});
            }
        });
    })();
    </script>
</head>
<body>
    <header>
        <h1><a href="{{ "/" | relURL }}">{{ .Site.Title }}</a></h1>
        <nav>
            <a href="{{ "/" | relURL }}">Home</a>
            <a href="{{ "/posts/" | relURL }}">All Posts</a>
            <a href="/downloads/">Checklists</a>
        </nav>
    </header>
    <main>
        <a href="{{ "/" | relURL }}" class="back-link">&larr; Back to Home</a>
        <article>
            {{ if .Params.featured_image }}
            <img src="{{ .Params.featured_image | relURL }}" alt="{{ .Title }}" style="max-height:300px;width:100%;object-fit:cover;border-radius:10px;">
            {{ end }}
            <h1>{{ .Title }}</h1>
            <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
            {{ .Content }}
        </article>
    </main>
    <footer>
        <p>&copy; {{ now.Year }} {{ .Site.Title }}</p>
    </footer>
</body>
</html>
