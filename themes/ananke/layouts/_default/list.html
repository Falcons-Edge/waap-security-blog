<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ .Title }} - {{ .Site.Title }}</title>
</head>
<body>
  <header><h1><a href="/">{{ .Site.Title }}</a></h1></header>
  <main>
  {{ range .Pages }}
    <article>
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      <time>{{ .Date.Format "2006-01-02" }}</time>
      <p>{{ .Summary }}</p>
    </article>
  {{ end }}
  </main>
</body>
</html>
