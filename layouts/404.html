<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — WAAP Security</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root { --accent: #f97316; --bg: #0a0a0f; --text: #e8e8ed; --muted: #8888a0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { text-align: center; max-width: 500px; padding: 2rem; }
    h1 { font-size: 4rem; color: var(--accent); margin-bottom: 1rem; }
    p { color: var(--muted); margin-bottom: 2rem; line-height: 1.6; }
    a { color: var(--accent); text-decoration: none; border: 1px solid var(--accent); padding: 0.5rem 1.5rem; border-radius: 4px; transition: all .2s; }
    a:hover { background: var(--accent); color: var(--bg); }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>This page doesn't exist. It may have been moved or the link you followed is broken.</p>
    <a href="/">Back to WAAP Security Blog</a>
  </div>
</body>
</html>
