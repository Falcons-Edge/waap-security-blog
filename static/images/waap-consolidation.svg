<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    .icon {
      fill: #333;
      stroke: #ccc;
      stroke-width: 1;
    }
    .consolidated {
      fill: #4CAF50;
      stroke: #388E3C;
      stroke-width: 1;
    }
  </style>
  <!-- WAF Icon -->
  <rect class="icon" x="10" y="20" width="20" height="20" rx="2"/>
  <!-- Bot Mitigation Icon -->
  <circle class="icon" cx="45" cy="30" r="10"/>
  <!-- API Security Icon -->
  <polygon class="icon" points="55,50 65,40 75,50 65,60"/>
  <!-- DDoS Icon -->
  <path class="icon" d="M80 70 l 5 5 l 5 -5 l -5 -5 Z"/>
  <!-- Consolidation Arrow -->
  <path d="M30 45 L 40 45 L 40 40 L 50 50 L 40 60 L 40 55 L 30 55 Z" fill="#aaa"/>
  <!-- Consolidated WAAP -->
  <rect class="consolidated" x="60" y="60" width="30" height="30" rx="4"/>
  <text x="75" y="78" font-family="sans-serif" font-size="10" text-anchor="middle" fill="white">WAAP</text>
</svg>
