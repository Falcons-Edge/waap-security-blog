<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e"/>

  <!-- WAF Box -->
  <rect x="220" y="100" width="160" height="100" rx="10" ry="10" fill="#4a4e69" stroke="#9a8c98" stroke-width="4"/>
  <text x="300" y="160" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">WAF</text>

  <!-- Incoming Traffic (Red) -->
  <g>
    <path d="M 50 150 Q 150 100, 220 150" fill="none" stroke="#e76f51" stroke-width="3"/>
    <text x="100" y="90" font-family="Arial, sans-serif" font-size="16" fill="#e76f51">Malicious Traffic</text>
    <circle cx="50" cy="150" r="5" fill="#e76f51"/>
    <circle cx="90" cy="130" r="4" fill="#e76f51"/>
    <circle cx="120" cy="170" r="3" fill="#e76f51"/>
  </g>

  <!-- Outgoing Traffic (Green) -->
  <g>
    <path d="M 300 200 Q 400 220, 550 150" fill="none" stroke="#2a9d8f" stroke-width="3"/>
    <text x="450" y="230" font-family="Arial, sans-serif" font-size="16" fill="#2a9d8f">Legitimate Traffic</text>
    <circle cx="300" cy="200" r="5" fill="#2a9d8f"/>
    <circle cx="350" cy="210" r="4" fill="#2a9d8f"/>
    <circle cx="400" cy="190" r="3" fill="#2a9d8f"/>
  </g>

  <!-- Blocked Indicator (on malicious path) -->
  <g>
    <line x1="215" y1="150" x2="225" y2="140" stroke="#e76f51" stroke-width="3"/>
    <line x1="215" y1="140" x2="225" y2="150" stroke="#e76f51" stroke-width="3"/>
    <text x="180" y="130" font-family="Arial, sans-serif" font-size="14" fill="#e76f51" transform="rotate(-30 180 130)">Blocked</text>
  </g>

</svg>